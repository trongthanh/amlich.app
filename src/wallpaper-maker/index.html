<!doctype html>
<html lang="vi">
	<head>
		<title>Calendar Wallpaper Maker by Thanh Tran</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Calendar Wallpaper maker" />
		<meta property="og:image" content="https://amlich.app/thumbnail.png" />
		<link rel="icon" href="/favicon.ico" sizes="16x16" />
		<link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/app-icon.png" />
		<meta name="theme-color" content="#212121" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
		<link href="/css/base.css" rel="stylesheet" />
		<link href="/css/shoelace/light.css" rel="stylesheet" />
		<link href="/css/shoelace/dark.css" rel="stylesheet" />
		<link href="/wallpaper-maker/styles.css" rel="stylesheet" />

		<script type="module">
			// TODO: look into source map warnings
			// Import custom elements
			import '../ce/wallpaper-display.js';
			import '../ce/cal-display.js';
			import '@shoelace-style/shoelace/dist/components/button/button.js';
			import '@shoelace-style/shoelace/dist/components/icon/icon.js';
			import '@shoelace-style/shoelace/dist/components/input/input.js';
			import '@shoelace-style/shoelace/dist/components/alert/alert.js';
			import '@shoelace-style/shoelace/dist/components/drawer/drawer.js';
			import { setBasePath } from '@shoelace-style/shoelace/dist/utilities/base-path.js';

			// Set the base path to the folder you copied Shoelace's assets to
			setBasePath('/');
		</script>
		<script type="module" src="wallpaper-maker.js"></script>
	</head>

	<body class="pt-16">
		<header class="fixed top-0 w-full z-10">
			<nav class="mx-auto flex max-w-7xl items-center justify-between p-4 lg:px-8" aria-label="Global">
				<div class="flex lg:flex-1">
					<a href="/" class="-m-1.5 p-1.5">
						<span class="sr-only">Your Company</span>
						<img class="h-8 w-auto" src="https://amlich.app/app-icon.svg" height="32" alt="" />
					</a>
				</div>

				<div class="hidden lg:flex lg:gap-x-12">
					<a href="/wallpaper-maker/" class="text-sm font-semibold leading-6 text-gray-900"
						>Wallpaper Maker</a
					>
				</div>
				<div class="flex lg:flex-1 lg:justify-end">
					<sl-button id="drawerButton">Click me</sl-button>
				</div>
			</nav>
		</header>

		<sl-drawer id="sidebar" label="Tools" placement="end" class="drawer-placement-start">
			This drawer slides in from the start.
			<sl-button slot="footer" variant="primary">Close</sl-button>
		</sl-drawer>
		<main class="mx-auto">
			<cal-display month="4" year="2024" start-week-on="mon"></cal-display>
			<div class="w-full h-lvh">
				<wallpaper-display></wallpaper-display>
			</div>
		</main>
		<footer class="fixed bottom-0 w-full">
			<div class="mx-auto flex max-w-7xl items-center justify-between p-4 lg:px-8">
				<div>
					<img class="align-middle size-8" src="https://int3ractive.com/images/favicon.png" height="32" />
					© 2024 <a href="https://int3ractive.com">Trần Trọng Thanh</a>. Built in Sài Gòn.
				</div>
				<a href="https://github.com/trongthanh/amlich.app"
					><sl-icon name="github" class="text-3xl text-black hover:text-blue-400"></sl-icon
				></a>
			</div>
		</footer>
	</body>
</html>
